services:
  mongodb:
    image: mongo:8.2.5
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - ./backend/.env
    entrypoint:
      - /bin/sh
      - -c
      - |
        export MONGO_INITDB_ROOT_USERNAME="$${DB_USERNAME:?DB_USERNAME is required}"
        export MONGO_INITDB_ROOT_PASSWORD="$${DB_PASSWORD:?DB_PASSWORD is required}"
        exec docker-entrypoint.sh mongod --bind_ip_all
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_HOST: mongodb
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  notif-worker:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      MONGODB_HOST: mongodb
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
    command: ["uv", "run", "notif-worker"]
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_PROXY_TARGET: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
